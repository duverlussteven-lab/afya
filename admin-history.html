<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History — AFYA Admin</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" href="favicon.ico">
<link rel="manifest" href="site.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin-shared.js"></script>
<style>
:root{
  --bg:#FDFCF9; --bg2:#F6F3EE; --bg3:#EEEAE2; --sur:#FFFFFF;
  --ink:#1D2B3A; --ink2:#3B5068; --ink3:#7A93A8;
  --sage:#6D8F82; --sage-l:#8BAD9E;
  --gold:#D4A843; --green:#4A9E6F; --red:#C94F3A;
  --purple:#9D4FCC; --blue:#3B5068;
  --border:rgba(109,143,130,.18);
  --shadow:rgba(29,43,58,.07);
  --disp:'Cormorant Garamond',serif; --ui:'Syne',sans-serif; --body:'DM Sans',sans-serif;
  --sidebar-w:260px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg2);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.6;min-height:100vh}

.sidebar{position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w); background:var(--ink); padding:24px 16px; overflow-y:auto; z-index:100; display:flex; flex-direction:column}
.sidebar-brand{display:flex; align-items:center; gap:10px; padding:8px 12px 24px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:16px}
.sidebar-brand-text{font-family:var(--ui); font-size:12px; font-weight:800; letter-spacing:.18em; color:white}
.sidebar-brand-badge{font-family:var(--ui); font-size:8px; font-weight:700; letter-spacing:.14em; color:var(--sage-l); background:rgba(139,173,158,.12); padding:3px 8px; border-radius:4px; margin-left:auto}
.sidebar-section-title{font-family:var(--ui); font-size:9px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.3); padding:14px 12px 8px}
.sidebar-link{display:flex; align-items:center; gap:11px; padding:11px 14px; border-radius:8px; cursor:pointer; font-family:var(--ui); font-size:12px; font-weight:600; color:rgba(255,255,255,.55); margin-bottom:2px; transition:all .15s; text-decoration:none}
.sidebar-link:hover{background:rgba(255,255,255,.05); color:white}
.sidebar-link.active{background:rgba(109,143,130,.15); color:white}
.sidebar-icon{font-size:14px; width:18px; text-align:center}

.main{margin-left:var(--sidebar-w); padding:32px 40px; min-height:100vh}

.admin-header{margin-bottom:24px}
.admin-eye{display:inline-flex; align-items:center; gap:10px; font-family:var(--ui); font-size:9px; font-weight:700; letter-spacing:.32em; text-transform:uppercase; color:var(--sage); margin-bottom:10px}
.admin-eye::before{content:''; display:block; width:20px; height:1px; background:var(--sage)}
.admin-title{font-family:var(--disp); font-size:42px; font-weight:300; line-height:1.05; color:var(--ink)}
.admin-title em{font-style:italic; color:var(--sage)}

/* Filters */
.filters-bar{background:var(--sur); border:1px solid var(--border); border-radius:12px; padding:14px 18px; margin-bottom:18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.filter-section{display:flex; gap:6px; flex-wrap:wrap; align-items:center}
.filter-label{font-family:var(--ui); font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--ink3); margin-right:4px}
.filter-btn{padding:7px 14px; border:1.5px solid var(--border); border-radius:100px; background:transparent; cursor:pointer; font-family:var(--ui); font-size:10px; font-weight:700; letter-spacing:.08em; color:var(--ink2); transition:all .2s}
.filter-btn.active{background:var(--sage); border-color:var(--sage); color:white}
.search-input{flex:1; min-width:200px; border:1.5px solid var(--border); border-radius:8px; padding:8px 12px; font-family:var(--ui); font-size:13px; outline:none}
.search-input:focus{border-color:var(--sage)}
.select-input{border:1.5px solid var(--border); border-radius:8px; padding:8px 12px; font-family:var(--ui); font-size:12px; outline:none; background:white; cursor:pointer}
.select-input:focus{border-color:var(--sage)}

/* Stats */
.stats-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px}
.stat-card{background:var(--sur); border:1px solid var(--border); border-radius:12px; padding:18px 20px}
.stat-num{font-family:var(--disp); font-size:32px; font-weight:400; color:var(--ink); margin-bottom:4px}
.stat-label{font-family:var(--ui); font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink3)}

/* Timeline */
.timeline{display:flex; flex-direction:column; gap:0; background:var(--sur); border-radius:14px; border:1px solid var(--border); padding:8px}
.log-entry{display:flex; gap:14px; padding:16px 14px; border-bottom:1px solid var(--border); transition:background .15s}
.log-entry:last-child{border-bottom:none}
.log-entry:hover{background:var(--bg2)}
.log-icon{
  width:42px; height:42px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; background:var(--bg2);
}
.log-icon.category-review{background:rgba(212,168,67,.15)}
.log-icon.category-report{background:rgba(201,79,58,.15)}
.log-icon.category-user{background:rgba(157,79,204,.15)}
.log-icon.category-restaurant{background:rgba(74,158,111,.15)}
.log-icon.category-activity{background:rgba(109,143,130,.15)}
.log-icon.category-suggestion{background:rgba(59,80,104,.15)}

.log-content{flex:1; min-width:0}
.log-top{display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap}
.log-actor{display:flex; align-items:center; gap:6px; font-family:var(--ui); font-size:12px; font-weight:700; color:var(--ink)}
.role-badge{font-family:var(--ui); font-size:8px; font-weight:700; letter-spacing:.1em; padding:2px 5px; border-radius:4px; color:white}
.role-badge.super{background:var(--purple)}
.role-badge.admin{background:var(--blue)}
.role-badge.mod{background:var(--green)}
.log-action-type{font-family:var(--ui); font-size:9px; font-weight:700; letter-spacing:.1em; padding:2px 8px; border-radius:100px; background:var(--bg2); color:var(--ink2); text-transform:uppercase}
.log-time{font-family:var(--ui); font-size:11px; color:var(--ink3); margin-left:auto}
.log-description{font-size:13px; color:var(--ink2); line-height:1.5; margin-bottom:4px}
.log-target{font-family:var(--ui); font-size:11px; color:var(--sage); font-weight:600}
.log-note{margin-top:6px; padding:8px 10px; background:var(--bg2); border-radius:6px; font-size:12px; color:var(--ink2); font-style:italic; border-left:2px solid var(--sage)}

.loading{text-align:center; padding:80px; color:var(--ink3); font-family:var(--ui); font-size:13px}
.empty{text-align:center; padding:80px; color:var(--ink3); font-family:var(--ui); font-size:13px; background:var(--sur); border-radius:14px; border:1px solid var(--border)}
.empty-icon{font-size:48px; margin-bottom:14px; opacity:.4}

.load-more{display:block; margin:20px auto; padding:11px 28px; background:var(--sur); border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-family:var(--ui); font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--ink2); transition:all .15s}
.load-more:hover{background:var(--sage); color:white; border-color:var(--sage)}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%); transition:transform .25s; z-index:1000}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0; padding:64px 16px 24px}
  .stats-row{grid-template-columns:1fr 1fr}
  .admin-title{font-size:32px}
  .log-time{margin-left:0; width:100%}
}
</style>
</head>
<body>

<div id="sidebarPlaceholder"></div>

<main class="main">

  <div class="admin-header">
    <div class="admin-eye">Audit Log</div>
    <h1 class="admin-title">Action <em>History</em></h1>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statToday">0</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statWeek">0</div>
      <div class="stat-label">Last 7 days</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statMonth">0</div>
      <div class="stat-label">Last 30 days</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">All time</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters-bar">
    <div class="filter-section">
      <span class="filter-label">Actor:</span>
      <select class="select-input" id="actorFilter" onchange="renderLogs()">
        <option value="all">All actors</option>
      </select>
    </div>
    <div class="filter-section">
      <span class="filter-label">Category:</span>
      <button class="filter-btn active" data-cat="all" onclick="setCategoryFilter('all', this)">All</button>
      <button class="filter-btn" data-cat="review" onclick="setCategoryFilter('review', this)">⭐ Reviews</button>
      <button class="filter-btn" data-cat="report" onclick="setCategoryFilter('report', this)">🚨 Reports</button>
      <button class="filter-btn" data-cat="user" onclick="setCategoryFilter('user', this)">👥 Users</button>
      <button class="filter-btn" data-cat="suggestion" onclick="setCategoryFilter('suggestion', this)">💡 Suggestions</button>
      <button class="filter-btn" data-cat="restaurant" onclick="setCategoryFilter('restaurant', this)">🍽️ Restaurants</button>
      <button class="filter-btn" data-cat="activity" onclick="setCategoryFilter('activity', this)">🎯 Activities</button>
    </div>
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search in logs..." oninput="renderLogs()">
  </div>

  <!-- Logs -->
  <div id="logsContainer">
    <div class="loading">Loading history…</div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://zryfceystyipimniarst.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uI4dQX6KFlLcxtxqw52ewA_ujacVkch';  // ⚠️ REMETS TA VRAIE CLÉ
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allLogs = [];
let allActors = {}; // map id -> profile
let currentUserId = null;
let currentUserRole = null;
let categoryFilter = 'all';
let actorFilter = 'all';
let displayLimit = 50;

async function checkAdmin() {
  return await afyaCheckAdminAccess(sb, ['admin', 'super_admin']);
}

async function loadLogs() {
  // Les RLS policies gèrent la visibilité automatiquement
  const { data, error } = await sb
    .from('audit_log')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(500);

  if (error) {
    console.error('❌ Error loading logs:', error);
    document.getElementById('logsContainer').innerHTML = `<div class="empty" style="color:var(--red)">Error: ${error.message}</div>`;
    return;
  }

  // Charger les profils des acteurs
  const actorIds = [...new Set((data || []).map(l => l.actor_id).filter(Boolean))];
  if (actorIds.length > 0) {
    const { data: profiles } = await sb
      .from('profiles')
      .select('id, first_name, email, role, avatar_url')
      .in('id', actorIds);
    (profiles || []).forEach(p => { allActors[p.id] = p; });
  }

  allLogs = data || [];
  populateActorFilter();
  updateStats();
  renderLogs();
}

function populateActorFilter() {
  const select = document.getElementById('actorFilter');
  const uniqueActors = [...new Set(allLogs.map(l => l.actor_id))];
  
  // Conserve l'option "all" et ajoute les actors
  select.innerHTML = '<option value="all">All actors</option>';
  uniqueActors.forEach(id => {
    const actor = allActors[id];
    if (!actor) return;
    const name = actor.first_name || actor.email?.split('@')[0] || 'Unknown';
    const roleSuffix = { super_admin: ' (Super Admin)', admin: ' (Admin)', moderator: ' (Moderator)' }[actor.role] || '';
    const option = document.createElement('option');
    option.value = id;
    option.textContent = name + roleSuffix;
    select.appendChild(option);
  });
}

function updateStats() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const week = new Date(now.getTime() - 7*24*60*60*1000);
  const month = new Date(now.getTime() - 30*24*60*60*1000);

  document.getElementById('statTotal').textContent = allLogs.length;
  document.getElementById('statToday').textContent = allLogs.filter(l => new Date(l.created_at) >= today).length;
  document.getElementById('statWeek').textContent = allLogs.filter(l => new Date(l.created_at) >= week).length;
  document.getElementById('statMonth').textContent = allLogs.filter(l => new Date(l.created_at) >= month).length;
}

function setCategoryFilter(cat, btn) {
  categoryFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  displayLimit = 50;
  renderLogs();
}

function renderLogs() {
  actorFilter = document.getElementById('actorFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  
  let list = [...allLogs];
  if (categoryFilter !== 'all') list = list.filter(l => l.action_category === categoryFilter);
  if (actorFilter !== 'all') list = list.filter(l => l.actor_id === actorFilter);
  if (search) {
    list = list.filter(l =>
      (l.description || '').toLowerCase().includes(search) ||
      (l.target_name || '').toLowerCase().includes(search) ||
      (l.note || '').toLowerCase().includes(search) ||
      (allActors[l.actor_id]?.first_name || '').toLowerCase().includes(search)
    );
  }

  if (list.length === 0) {
    document.getElementById('logsContainer').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📜</div>
        <div>No log entries found.</div>
        <div style="margin-top:8px;font-size:11px;opacity:.7">Try changing your filters or perform some admin actions.</div>
      </div>
    `;
    return;
  }

  const displayList = list.slice(0, displayLimit);
  const hasMore = list.length > displayLimit;

  document.getElementById('logsContainer').innerHTML = `
    <div class="timeline">
      ${displayList.map(l => logEntry(l)).join('')}
    </div>
    ${hasMore ? `<button class="load-more" onclick="loadMore()">Load more (${list.length - displayLimit} remaining)</button>` : ''}
  `;
}

function loadMore() {
  displayLimit += 50;
  renderLogs();
}

function logEntry(l) {
  const actor = allActors[l.actor_id];
  const actorName = actor?.first_name || actor?.email?.split('@')[0] || 'Unknown';
  const actorRole = l.actor_role; // snapshot du rôle au moment de l'action
  const roleLabel = { super_admin: 'SUPER', admin: 'ADMIN', moderator: 'MOD' }[actorRole] || '';
  const roleCls = { super_admin: 'super', admin: 'admin', moderator: 'mod' }[actorRole] || '';

  const date = new Date(l.created_at);
  const timeAgo = getTimeAgo(date);
  const fullDate = date.toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });

  // Icon based on category
  const categoryIcons = {
    review: '⭐', report: '🚨', user: '👥',
    restaurant: '🍽️', activity: '🎯', suggestion: '💡'
  };
  const icon = categoryIcons[l.action_category] || '📌';

  // Action type label (lisible)
  const actionLabel = (l.action_type || '').replace(/_/g, ' ').toUpperCase();

  return `
    <div class="log-entry">
      <div class="log-icon category-${l.action_category}">${icon}</div>
      <div class="log-content">
        <div class="log-top">
          <div class="log-actor">
            ${escapeHtml(actorName)}
            ${roleCls ? `<span class="role-badge ${roleCls}">${roleLabel}</span>` : ''}
          </div>
          <span class="log-action-type">${actionLabel}</span>
          <span class="log-time" title="${fullDate}">${timeAgo}</span>
        </div>
        <div class="log-description">${escapeHtml(l.description)}</div>
        ${l.target_name ? `<div class="log-target">🎯 ${escapeHtml(l.target_name)}</div>` : ''}
        ${l.note ? `<div class="log-note">"${escapeHtml(l.note)}"</div>` : ''}
      </div>
    </div>
  `;
}

function getTimeAgo(date) {
  const now = new Date();
  const diffMs = now - date;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHr = Math.floor(diffMin / 60);
  const diffDay = Math.floor(diffHr / 24);

  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  if (diffHr < 24) return `${diffHr}h ago`;
  if (diffDay < 7) return `${diffDay}d ago`;
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function escapeHtml(text) {
  if (!text && text !== 0) return '';
  const div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

async function init() {
  const auth = await checkAdmin();
  if (!auth) return;

  currentUserId = auth.user.id;
  currentUserRole = auth.profile.role;

  afyaInjectSidebar(auth.profile, 'history');

  await loadLogs();
  console.log('✅ History loaded as:', currentUserRole);
}

init();
</script>
</body>
</html>
