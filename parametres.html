<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — AFYA</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" href="favicon.ico">
<link rel="manifest" href="site.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="avatars.js" defer></script>
<style>
:root{--bg:#FDFCF9;--bg2:#F6F3EE;--bg3:#EEEAE2;--sur:#FFFFFF;--ink:#1D2B3A;--ink2:#3B5068;--ink3:#7A93A8;--sage:#6D8F82;--sage-l:#8BAD9E;--gold:#D4A843;--green:#4A9E6F;--red:#C94F3A;--purple:#9D4FCC;--blue:#3B5068;--border:rgba(109,143,130,.18);--shadow:rgba(29,43,58,.07);--disp:'Cormorant Garamond',serif;--ui:'Syne',sans-serif;--body:'DM Sans',sans-serif}
[data-theme="dark"]{--bg:#111A22;--bg2:#162028;--bg3:#1D2B3A;--sur:#1E2C3A;--ink:#F0EDE8;--ink2:#A8BDC8;--ink3:#6B8A9A;--border:rgba(139,173,158,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg2);color:var(--ink);font-family:var(--body);min-height:100vh}
a{color:inherit;text-decoration:none}
#nav{position:sticky;top:0;background:var(--sur);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;z-index:50}
.nav-back{display:flex;align-items:center;gap:8px;font-family:var(--ui);font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;padding:8px 14px;border-radius:8px;transition:all .2s}
.nav-back:hover{background:var(--bg2);color:var(--ink)}
.container{max-width:1100px;margin:40px auto;padding:0 24px;display:grid;grid-template-columns:240px 1fr;gap:30px}
.page-header{grid-column:1/-1;margin-bottom:10px}
.page-title{font-family:var(--disp);font-size:48px;font-weight:300;line-height:1.1;margin-bottom:6px}
.page-title em{color:var(--sage);font-style:italic}
.page-subtitle{font-size:13px;color:var(--ink2)}
/* Sidebar */
.sidebar{position:sticky;top:90px;height:fit-content}
.sidebar-tab{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;cursor:pointer;font-family:var(--ui);font-size:12px;font-weight:600;color:var(--ink2);transition:all .15s;margin-bottom:4px}
.sidebar-tab:hover{background:var(--bg2)}
.sidebar-tab.active{background:var(--ink);color:white}
.sidebar-tab-icon{font-size:16px}
.sidebar-tab.danger{color:var(--red)}
.sidebar-tab.danger.active{background:var(--red);color:white}
/* Content */
.tab-section{background:var(--sur);border-radius:18px;padding:36px;box-shadow:0 4px 16px var(--shadow);display:none}
.tab-section.active{display:block}
.section-title{font-family:var(--disp);font-size:30px;font-weight:400;margin-bottom:6px}
.section-subtitle{font-size:13px;color:var(--ink3);margin-bottom:28px}
.form-group{margin-bottom:22px}
.form-label{display:block;font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-bottom:8px}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:var(--body);font-size:14px;background:var(--sur);color:var(--ink);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--sage)}
.form-input:disabled{opacity:.6;cursor:not-allowed;background:var(--bg2)}
.form-help{font-size:11px;color:var(--ink3);margin-top:4px;font-family:var(--ui)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{padding:11px 22px;border-radius:100px;cursor:pointer;font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1.5px solid var(--border);transition:all .15s}
.btn-primary{background:var(--ink);color:white;border-color:var(--ink)}
.btn-primary:hover{background:var(--sage);border-color:var(--sage);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--ink2)}
.btn-ghost:hover{background:var(--bg2)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red);color:white}
/* Avatar selector */
.current-avatar{display:flex;align-items:center;gap:20px;padding:20px;background:var(--bg2);border-radius:14px;margin-bottom:24px}
.current-avatar-img{width:80px;height:80px;border-radius:50%;overflow:hidden;border:4px solid var(--sur);background:white;flex-shrink:0}
.current-avatar-img img{width:100%;height:100%;display:block}
.current-avatar-info{flex:1}
.current-avatar-label{font-family:var(--ui);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.current-avatar-name{font-family:var(--disp);font-size:22px;font-weight:400;color:var(--ink)}
.avatar-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.avatar-filter-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:100px;background:transparent;cursor:pointer;font-family:var(--ui);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--ink2);transition:all .15s}
.avatar-filter-btn.active{background:var(--sage);border-color:var(--sage);color:white}
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:10px;max-height:400px;overflow-y:auto;padding:14px;background:var(--bg2);border-radius:12px}
.avatar-option{width:64px;height:64px;border-radius:50%;overflow:hidden;border:3px solid transparent;cursor:pointer;transition:all .15s;background:var(--sur)}
.avatar-option:hover{transform:scale(1.08);border-color:var(--sage-l)}
.avatar-option.selected{border-color:var(--sage);transform:scale(1.05);box-shadow:0 0 0 3px rgba(109,143,130,.2)}
.avatar-option img{width:100%;height:100%;display:block}
/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg2);border-radius:10px;margin-bottom:10px}
.toggle-info{flex:1}
.toggle-title{font-family:var(--ui);font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px}
.toggle-desc{font-size:11px;color:var(--ink3);font-family:var(--ui)}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--ink3);border-radius:24px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
.toggle input:checked + .toggle-slider{background:var(--sage)}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px)}
/* Theme picker */
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.theme-card{padding:18px;border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all .15s}
.theme-card:hover{border-color:var(--sage-l)}
.theme-card.selected{border-color:var(--sage);background:rgba(109,143,130,.05)}
.theme-card-icon{font-size:24px;margin-bottom:6px}
.theme-card-name{font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2)}
.theme-card.selected .theme-card-name{color:var(--ink)}
/* Danger zone */
.danger-zone{padding:24px;background:rgba(201,79,58,.05);border:1.5px dashed rgba(201,79,58,.3);border-radius:14px;text-align:center}
.danger-icon{font-size:36px;margin-bottom:10px}
.danger-title{font-family:var(--disp);font-size:24px;color:var(--red);margin-bottom:8px}
.danger-desc{font-size:13px;color:var(--ink2);margin-bottom:18px}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:white;padding:14px 20px;border-radius:10px;font-family:var(--ui);font-size:12px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);transform:translateY(100px);opacity:0;transition:all .3s;z-index:9999}
.toast.show{transform:translateY(0);opacity:1}
.loading{text-align:center;padding:60px;color:var(--ink3);font-family:var(--ui);font-size:13px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(29,43,58,.6);backdrop-filter:blur(8px);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--sur);border-radius:18px;max-width:480px;width:100%;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-family:var(--disp);font-size:28px;font-weight:400;color:var(--red);margin-bottom:8px}
.modal-desc{font-size:13px;color:var(--ink2);margin-bottom:18px;line-height:1.6}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.auth-required{max-width:480px;margin:80px auto;background:var(--sur);border-radius:20px;padding:50px 30px;text-align:center;box-shadow:0 12px 36px var(--shadow)}
.auth-required-icon{font-size:64px;margin-bottom:20px;opacity:.5}
@media(max-width:768px){
  .container{grid-template-columns:1fr;padding:0 16px;margin:20px auto}
  .sidebar{position:relative;top:0;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:6px;margin-bottom:8px}
  .sidebar-tab{font-size:11px;padding:10px 12px}
  .tab-section{padding:24px}
  .page-title{font-size:36px}
  .theme-grid{grid-template-columns:1fr}
}
</style>
<script src="i18n.js" defer></script>
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back to home
  </a>
  <a href="mon-espace.html" class="nav-back">My Space →</a>
</nav>

<div class="container" id="mainContent">
  <div class="loading" style="grid-column:1/-1">Loading your settings…</div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="deleteModal" onclick="if(event.target===this)closeDeleteModal()">
  <div class="modal">
    <div style="text-align:center;font-size:48px;margin-bottom:14px">⚠️</div>
    <h2 class="modal-title" style="text-align:center">Delete your account?</h2>
    <p class="modal-desc">This action is <strong>permanent and cannot be undone</strong>. All your data will be deleted:</p>
    <ul style="font-size:13px;color:var(--ink2);padding-left:24px;line-height:2;margin-bottom:18px">
      <li>Your profile and avatar</li>
      <li>All your reviews and replies</li>
      <li>Your wishlist and programs</li>
      <li>Your notification history</li>
    </ul>
    <p style="font-size:13px;color:var(--ink2);margin-bottom:8px">Type <strong>DELETE</strong> to confirm:</p>
    <input type="text" class="form-input" id="deleteConfirm" placeholder="DELETE">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete forever</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
const SUPABASE_URL = 'https://zryfceystyipimniarst.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uI4dQX6KFlLcxtxqw52ewA_ujacVkch';  // REMETS TA CLE
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;
let currentTab = 'profile';
let avatarCategoryFilter = 'all';

const LANGUAGES = [
  { code: 'en', flag: '🇬🇧', name: 'English' },
  { code: 'fr', flag: '🇫🇷', name: 'Français' },
  { code: 'es', flag: '🇪🇸', name: 'Español' },
  { code: 'it', flag: '🇮🇹', name: 'Italiano' },
  { code: 'de', flag: '🇩🇪', name: 'Deutsch' },
  { code: 'zh', flag: '🇨🇳', name: '中文 (Chinese)' },
  { code: 'ja', flag: '🇯🇵', name: '日本語 (Japanese)' }
];

const AVATAR_CATEGORIES = [
  { id: 'all', emoji: '🌟', label: 'All' },
  { id: 'adventurer', emoji: '🎨', label: 'Adventurer' },
  { id: 'lorelei', emoji: '💎', label: 'Lorelei' },
  { id: 'bigsmile', emoji: '😄', label: 'Big Smile' },
  { id: 'bottts', emoji: '🤖', label: 'Bottts' },
  { id: 'shapes', emoji: '✨', label: 'Shapes' }
];

function toast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    document.getElementById('mainContent').innerHTML = `
      <div class="auth-required" style="grid-column:1/-1">
        <div class="auth-required-icon">🔒</div>
        <h2 style="font-family:var(--disp);font-size:32px;font-weight:400;color:var(--ink);margin-bottom:12px">Please sign in</h2>
        <p style="font-size:14px;color:var(--ink2);margin-bottom:24px">You need to be signed in to access your settings.</p>
        <a href="index.html" class="btn btn-primary">Go to homepage</a>
      </div>
    `;
    return;
  }
  currentUser = user;
  
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (error || !profile) {
    document.getElementById('mainContent').innerHTML = '<div class="loading" style="grid-column:1/-1;color:var(--red)">Error loading profile</div>';
    return;
  }
  currentProfile = profile;
  
  // Wait for avatars.js to load
  let attempts = 0;
  while (typeof window.AFYA_AVATARS === 'undefined' && attempts < 30) {
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }
  
  renderPage();
}

function renderPage() {
  document.getElementById('mainContent').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Account <em>Settings</em></h1>
      <p class="page-subtitle">Manage your profile, security and preferences</p>
    </div>

    <aside class="sidebar">
      <div class="sidebar-tab ${currentTab === 'profile' ? 'active' : ''}" onclick="switchTab('profile')">
        <span class="sidebar-tab-icon">👤</span> Profile
      </div>
      <div class="sidebar-tab ${currentTab === 'security' ? 'active' : ''}" onclick="switchTab('security')">
        <span class="sidebar-tab-icon">🔐</span> Security
      </div>
      <div class="sidebar-tab ${currentTab === 'notifications' ? 'active' : ''}" onclick="switchTab('notifications')">
        <span class="sidebar-tab-icon">🔔</span> Notifications
      </div>
      <div class="sidebar-tab ${currentTab === 'preferences' ? 'active' : ''}" onclick="switchTab('preferences')">
        <span class="sidebar-tab-icon">🎨</span> Preferences
      </div>
      <div class="sidebar-tab danger ${currentTab === 'danger' ? 'active' : ''}" onclick="switchTab('danger')">
        <span class="sidebar-tab-icon">⚠️</span> Danger Zone
      </div>
    </aside>

    <main>
      <div class="tab-section ${currentTab === 'profile' ? 'active' : ''}" id="profileTab">${renderProfileTab()}</div>
      <div class="tab-section ${currentTab === 'security' ? 'active' : ''}" id="securityTab">${renderSecurityTab()}</div>
      <div class="tab-section ${currentTab === 'notifications' ? 'active' : ''}" id="notificationsTab">${renderNotificationsTab()}</div>
      <div class="tab-section ${currentTab === 'preferences' ? 'active' : ''}" id="preferencesTab">${renderPreferencesTab()}</div>
      <div class="tab-section ${currentTab === 'danger' ? 'active' : ''}" id="dangerTab">${renderDangerTab()}</div>
    </main>
  `;
}

function switchTab(tab) {
  currentTab = tab;
  renderPage();
}

function renderProfileTab() {
  const avatar = currentProfile.avatar_id ? window.getAvatarById(currentProfile.avatar_id) : null;
  const customPhoto = currentProfile.avatar_url && currentProfile.avatar_url.includes('supabase');
  const avatarUrl = customPhoto ? currentProfile.avatar_url : (avatar?.url || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(currentProfile.first_name || currentProfile.email)}`);
  const avatarName = customPhoto ? 'Custom photo' : (avatar?.name || 'No avatar selected');
  const signupDate = new Date(currentProfile.created_at || Date.now()).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  
  const filteredAvatars = avatarCategoryFilter === 'all' 
    ? (window.AFYA_AVATARS || [])
    : (window.AFYA_AVATARS || []).filter(a => a.category === avatarCategoryFilter);
  
  return `
    <h2 class="section-title">Profile</h2>
    <p class="section-subtitle">Update your personal information and avatar</p>
    
    <div class="current-avatar">
      <div class="current-avatar-img"><img src="${avatarUrl}" alt="Avatar"></div>
      <div class="current-avatar-info">
        <div class="current-avatar-label">Current avatar</div>
        <div class="current-avatar-name">${avatarName}</div>
      </div>
    </div>
    
    <div class="form-group">
      <div class="form-group">
      <label class="form-label">📸 Upload your photo</label>
      <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="document.getElementById('avatarFile').click()">📸 Choose from computer</button>
        ${currentProfile.avatar_url && currentProfile.avatar_url.includes('supabase') ? `<button class="btn btn-ghost" onclick="removeCustomAvatar()" style="color:var(--red);border-color:var(--red)">🗑️ Remove photo</button>` : ''}
      </div>
      <div class="form-help">Or choose from the avatars below. JPG, PNG, WebP. Max 2MB.</div>
    </div>
    
    <div style="height:1px;background:var(--border);margin:20px 0"></div>
      <label class="form-label">Choose your avatar</label>
      <div class="avatar-filter">
        ${AVATAR_CATEGORIES.map(c => `
          <button class="avatar-filter-btn ${avatarCategoryFilter === c.id ? 'active' : ''}" onclick="filterAvatars('${c.id}')">${c.emoji} ${c.label}</button>
        `).join('')}
      </div>
      <div class="avatar-grid">
        ${filteredAvatars.map(a => `
          <div class="avatar-option ${currentProfile.avatar_id === a.id ? 'selected' : ''}" onclick="selectAvatar('${a.id}')" title="${a.name}">
            <img src="${a.url}" alt="" loading="lazy">
          </div>
        `).join('')}
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First name</label>
        <input type="text" class="form-input" id="firstName" value="${escapeAttr(currentProfile.first_name || '')}" maxlength="50">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" value="${escapeAttr(currentProfile.email || '')}" disabled>
        <div class="form-help">Email cannot be changed</div>
      </div>
    </div>
    
    <div class="form-group">
      <label class="form-label">Member since</label>
      <input type="text" class="form-input" value="${signupDate}" disabled>
    </div>
    
    <button class="btn btn-primary" onclick="saveProfile()" id="saveProfileBtn">💾 Save changes</button>
  `;
}

function renderSecurityTab() {
  return `
    <h2 class="section-title">Security</h2>
    <p class="section-subtitle">Manage your password and account security</p>
    
    <div class="form-group">
      <label class="form-label">New password</label>
      <input type="password" class="form-input" id="newPassword" placeholder="At least 8 characters" minlength="8">
      <div class="form-help">Must be at least 8 characters long</div>
    </div>
    
    <div class="form-group">
      <label class="form-label">Confirm new password</label>
      <input type="password" class="form-input" id="confirmPassword" placeholder="Re-type your new password">
    </div>
    
    <button class="btn btn-primary" onclick="changePassword()" id="savePasswordBtn">🔐 Update password</button>
    
    <div style="margin-top:30px;padding:16px;background:var(--bg2);border-radius:10px;border-left:3px solid var(--sage)">
      <p style="font-size:12px;color:var(--ink2);font-family:var(--ui);line-height:1.6">
        💡 <strong>Tip:</strong> Use a strong password mixing uppercase, lowercase, numbers and symbols.
      </p>
    </div>
  `;
}

function renderNotificationsTab() {
  const prefs = currentProfile.notification_preferences || {};
  const items = [
    { key: 'review_approved', icon: '✅', title: 'Review approved', desc: 'When one of your reviews is approved by moderators' },
    { key: 'review_rejected', icon: '⚠️', title: 'Review rejected', desc: 'When one of your reviews is rejected with a reason' },
    { key: 'replies', icon: '💬', title: 'New replies', desc: 'When someone replies to your reviews or replies' },
    { key: 'reports', icon: '🚨', title: 'Report updates', desc: 'When your report is reviewed by moderators' },
    { key: 'marketing', icon: '📣', title: 'News & updates', desc: 'Product news, tips, and travel inspiration (optional)' }
  ];
  
  return `
    <h2 class="section-title">Notifications</h2>
    <p class="section-subtitle">Choose what you want to be notified about</p>
    
    ${items.map(item => `
      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-title">${item.icon} ${item.title}</div>
          <div class="toggle-desc">${item.desc}</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="notif_${item.key}" ${prefs[item.key] !== false ? 'checked' : ''}>
          <span class="toggle-slider"></span>
        </label>
      </div>
    `).join('')}
    
    <button class="btn btn-primary" onclick="saveNotifications()" style="margin-top:20px">💾 Save preferences</button>
  `;
}

// ═══ Avatar selection ═══
function filterAvatars(category) {
  avatarCategoryFilter = category;
  renderPage();
}

async function handleAvatarUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  if (file.size > 2 * 1024 * 1024) {
    toast('⚠️ File too large (max 2MB)');
    return;
  }
  
  if (!file.type.startsWith('image/')) {
    toast('⚠️ Only images are allowed');
    return;
  }
  
  toast('📤 Uploading...');
  
  const ext = file.name.split('.').pop();
  const filename = `${currentUser.id}/${Date.now()}.${ext}`;
  
  const { error: uploadError } = await sb.storage
    .from('avatars')
    .upload(filename, file, { upsert: true });
  
  if (uploadError) {
    toast(`❌ Upload failed: ${uploadError.message}`);
    return;
  }
  
  const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(filename);
  
  const { error: updateError } = await sb.from('profiles').update({
    avatar_url: publicUrl,
    avatar_id: null  // Reset avatar DiceBear quand on upload une photo
  }).eq('id', currentUser.id);
  
  if (updateError) {
    toast(`❌ Save failed: ${updateError.message}`);
    return;
  }
  
  currentProfile.avatar_url = publicUrl;
  currentProfile.avatar_id = null;
  toast('✅ Avatar updated!');
  renderPage();
}

async function removeCustomAvatar() {
  if (!confirm('Remove your custom photo?')) return;
  
  const { error } = await sb.from('profiles').update({
    avatar_url: null
  }).eq('id', currentUser.id);
  
  if (error) { toast(`❌ Error: ${error.message}`); return; }
  
  currentProfile.avatar_url = null;
  toast('✅ Photo removed');
  renderPage();
}
function selectAvatar(avatarId) {
  currentProfile.avatar_id = avatarId;
  renderPage();
}

// ═══ Save Profile ═══
async function saveProfile() {
  const btn = document.getElementById('saveProfileBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  
  const firstName = document.getElementById('firstName').value.trim();
  
  const { error } = await sb.from('profiles').update({
    avatar_id: currentProfile.avatar_id,
    first_name: firstName || null,
    avatar_url: currentProfile.avatar_id ? window.getAvatarUrl(currentProfile.avatar_id) : null
  }).eq('id', currentUser.id);
  
  btn.disabled = false;
  btn.innerHTML = '💾 Save changes';
  
  if (error) { toast(`❌ Error: ${error.message}`); return; }
  
  currentProfile.first_name = firstName;
  toast('✅ Profile updated!');
}

// ═══ Change Password ═══
async function changePassword() {
  const newPwd = document.getElementById('newPassword').value;
  const confirmPwd = document.getElementById('confirmPassword').value;
  
  if (newPwd.length < 8) { toast('⚠️ Password must be at least 8 characters'); return; }
  if (newPwd !== confirmPwd) { toast('⚠️ Passwords do not match'); return; }
  
  const btn = document.getElementById('savePasswordBtn');
  btn.disabled = true;
  btn.textContent = 'Updating...';
  
  const { error } = await sb.auth.updateUser({ password: newPwd });
  
  btn.disabled = false;
  btn.innerHTML = '🔐 Update password';
  
  if (error) { toast(`❌ Error: ${error.message}`); return; }
  
  document.getElementById('newPassword').value = '';
  document.getElementById('confirmPassword').value = '';
  toast('✅ Password updated successfully!');
}

// ═══ Save Notifications ═══
async function saveNotifications() {
  const prefs = {
    review_approved: document.getElementById('notif_review_approved').checked,
    review_rejected: document.getElementById('notif_review_rejected').checked,
    replies: document.getElementById('notif_replies').checked,
    reports: document.getElementById('notif_reports').checked,
    marketing: document.getElementById('notif_marketing').checked
  };
  
  const { error } = await sb.from('profiles').update({
    notification_preferences: prefs
  }).eq('id', currentUser.id);
  
  if (error) { toast(`❌ Error: ${error.message}`); return; }
  
  currentProfile.notification_preferences = prefs;
  toast('✅ Notification preferences saved');
}

// ═══ Preferences ═══
function selectTheme(theme) {
  currentProfile.theme = theme;
  renderPage();
}

async function savePreferences() {
  const lang = document.getElementById('languageSelect').value;
  const theme = currentProfile.theme;
  
  const { error } = await sb.from('profiles').update({
    preferred_language: lang,
    theme: theme
  }).eq('id', currentUser.id);
  
  if (error) { toast(`❌ Error: ${error.message}`); return; }
  
  currentProfile.preferred_language = lang;
  toast('✅ Preferences saved');
  
  // Appliquer le thème immédiatement
  if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  else if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else {
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  }
}

// ═══ Delete Account ═══
function openDeleteModal() {
  document.getElementById('deleteModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('deleteConfirm').focus(), 100);
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('deleteConfirm').value = '';
}

async function confirmDelete() {
  const input = document.getElementById('deleteConfirm').value.trim();
  if (input !== 'DELETE') { toast('⚠️ Please type DELETE exactly'); return; }
  
  // Suppression du profil (cascade vers wishlist, programs, reviews etc.)
  const { error } = await sb.from('profiles').delete().eq('id', currentUser.id);
  if (error) { toast(`❌ Error: ${error.message}`); return; }
  
  // Sign out
  await sb.auth.signOut();
  toast('Account deleted. Goodbye 👋');
  setTimeout(() => window.location.href = 'index.html', 1500);
}

function escapeAttr(text) {
  return String(text || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// Apply theme on load
document.addEventListener('DOMContentLoaded', () => {
  init();
});
