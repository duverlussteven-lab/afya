<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatars Preview — AFYA</title>
<link rel="icon" type="image/png" href="favicon-32x32.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="avatars.js" defer></script>
<style>
:root{--bg:#FDFCF9;--bg2:#F6F3EE;--sur:#FFFFFF;--ink:#1D2B3A;--ink2:#3B5068;--ink3:#7A93A8;--sage:#6D8F82;--border:rgba(109,143,130,.18);--shadow:rgba(29,43,58,.07);--disp:'Cormorant Garamond',serif;--ui:'Syne',sans-serif;--body:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg2);color:var(--ink);font-family:var(--body);padding:40px 24px}
.container{max-width:1200px;margin:0 auto}
h1{font-family:var(--disp);font-size:54px;font-weight:300;line-height:1.1;margin-bottom:8px}
h1 em{color:var(--sage);font-style:italic}
.subtitle{color:var(--ink2);margin-bottom:40px;font-size:14px}
.category-section{margin-bottom:50px}
.category-header{font-family:var(--ui);font-size:14px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;padding-bottom:8px;border-bottom:2px solid var(--sage);display:flex;align-items:center;gap:10px}
.category-count{background:var(--sage);color:white;padding:3px 10px;border-radius:100px;font-size:11px}
.category-desc{font-size:12px;color:var(--ink3);margin-bottom:20px;font-style:italic}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:18px}
.avatar-card{background:var(--sur);border-radius:16px;padding:14px;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center}
.avatar-card:hover{transform:translateY(-3px);box-shadow:0 12px 24px var(--shadow);border-color:var(--sage)}
.avatar-card.selected{border-color:var(--sage);background:rgba(109,143,130,.08)}
.avatar-img{width:90px;height:90px;border-radius:50%;overflow:hidden;border:3px solid var(--bg2);background:white}
.avatar-img img{width:100%;height:100%;display:block}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding:16px 20px;background:var(--sur);border-radius:12px;box-shadow:0 4px 12px var(--shadow);flex-wrap:wrap;gap:12px}
.toolbar-info{font-family:var(--ui);font-size:11px;color:var(--ink2);font-weight:600;letter-spacing:.08em}
</style>
</head>
<body>

<div class="container">
  <h1>The 80 <em>Avatars</em></h1>
  <p class="subtitle">Powered by DiceBear — high quality, professional, and diverse. Click any avatar to select.</p>
  
  <div class="toolbar">
    <div class="toolbar-info" id="selectedInfo">Click any avatar to see its ID</div>
  </div>
  
  <div id="content">
    <p style="text-align:center;padding:80px;color:var(--ink3)">Loading avatars...</p>
  </div>
</div>

<script>
const CATEGORIES = [
  { id: 'adventurer', emoji: '🎨', name: 'Adventurer', desc: 'Cartoon Pixar-like, diverse and colorful' },
  { id: 'lorelei', emoji: '💎', name: 'Lorelei', desc: 'Elegant portrait illustrations' },
  { id: 'bigsmile', emoji: '😄', name: 'Big Smile', desc: 'Expressive cartoon faces, super fun' },
  { id: 'bottts', emoji: '🤖', name: 'Bottts', desc: 'Cyberpunk robots and creatures' },
  { id: 'shapes', emoji: '✨', name: 'Shapes', desc: 'Geometric and abstract art' }
];

document.addEventListener('DOMContentLoaded', () => {
  if (typeof window.AFYA_AVATARS === 'undefined') {
    document.getElementById('content').innerHTML = '<p style="color:red;text-align:center">avatars.js not loaded</p>';
    return;
  }
  render();
});

function render() {
  let html = '';
  CATEGORIES.forEach(cat => {
    const items = window.AFYA_AVATARS.filter(a => a.category === cat.id);
    html += `
      <div class="category-section">
        <h2 class="category-header">${cat.emoji} ${cat.name}<span class="category-count">${items.length}</span></h2>
        <p class="category-desc">${cat.desc}</p>
        <div class="grid">
          ${items.map(a => `
            <div class="avatar-card" onclick="selectAvatar('${a.id}', '${a.name}', this)" title="${a.id}">
              <div class="avatar-img"><img src="${a.url}" alt="" loading="lazy"></div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });
  document.getElementById('content').innerHTML = html;
}

function selectAvatar(id, name, el) {
  document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('selectedInfo').textContent = `✓ Selected: ${id}`;
  console.log('Selected avatar:', id, '— URL:', window.getAvatarUrl(id));
}
</script>

</body>
</html>
