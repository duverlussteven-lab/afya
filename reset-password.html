<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — AFYA</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" href="favicon.ico">
<link rel="manifest" href="site.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#FDFCF9; --bg2:#F6F3EE; --bg3:#EEEAE2; --sur:#FFFFFF;
  --ink:#1D2B3A; --ink2:#3B5068; --ink3:#7A93A8;
  --sage:#6D8F82; --sage-l:#8BAD9E; --sage-p:#C8D8D2;
  --gold:#D4A843; --green:#4A9E6F; --red:#C94F3A;
  --border:rgba(109,143,130,.18); --border2:rgba(109,143,130,.3);
  --shadow:rgba(29,43,58,.07);
  --disp:'Cormorant Garamond',serif; --ui:'Syne',sans-serif; --body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

.card{
  background:var(--sur);
  border-radius:20px;
  padding:48px 40px;
  max-width:460px;
  width:100%;
  box-shadow:0 24px 64px rgba(29,43,58,.12);
  text-align:center;
}

.eye{display:inline-flex;align-items:center;gap:10px;font-family:var(--ui);font-size:9px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;color:var(--sage);margin-bottom:18px}
.eye::before,.eye::after{content:'';display:block;width:20px;height:1px;background:var(--sage)}

h1{font-family:var(--disp);font-size:38px;font-weight:400;margin-bottom:10px}
h1 em{font-style:italic;color:var(--sage)}
.sub{color:var(--ink2);font-size:14px;line-height:1.7;margin-bottom:32px}

label{display:block;text-align:left;font-family:var(--ui);font-size:9px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--sage);margin-bottom:7px}
input{
  width:100%;
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:8px;
  padding:13px 16px;
  font-family:var(--body);
  font-size:14px;
  color:var(--ink);
  outline:none;
  margin-bottom:18px;
}
input:focus{border-color:var(--sage)}

button{
  width:100%;
  padding:14px;
  background:var(--ink);
  color:white;
  border:none;
  border-radius:10px;
  font-family:var(--ui);
  font-size:12px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .25s;
}
button:hover{background:var(--sage)}
button:disabled{opacity:.5;cursor:not-allowed}

.message{
  padding:12px 16px;
  border-radius:8px;
  font-size:13px;
  margin-bottom:18px;
  display:none;
}
.message.error{background:rgba(201,79,58,.1);color:var(--red);display:block}
.message.success{background:rgba(74,158,111,.1);color:var(--green);display:block}

.back{
  display:inline-block;
  margin-top:24px;
  font-family:var(--ui);
  font-size:11px;
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--sage);
  text-decoration:none;
}
.back:hover{color:var(--ink)}
</style>
</head>
<body>

<div class="card">
  <div class="eye">Reset Password</div>
  <h1>Choose a <em>new password</em></h1>
  <p class="sub">Enter a strong password below. Make sure it's at least 6 characters.</p>

  <div class="message" id="message"></div>

  <form onsubmit="event.preventDefault();resetPassword()">
    <label>New password</label>
    <input type="password" id="newPassword" placeholder="At least 6 characters" required>

    <label>Confirm password</label>
    <input type="password" id="confirmPassword" placeholder="Type it again" required>

    <button type="submit" id="submitBtn">Update password</button>
  </form>

  <a href="index.html" class="back">← Back to AFYA</a>
</div>

<script>
const SUPABASE_URL = 'https://zryfceystyipimniarst.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uI4dQX6KFlLcxtxqw52ewA_ujacVkch';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showMessage(text, type='error') {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = 'message ' + type;
}

async function resetPassword() {
  const newPwd = document.getElementById('newPassword').value;
  const confirmPwd = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('submitBtn');

  if (newPwd.length < 6) {
    showMessage('Password must be at least 6 characters');
    return;
  }
  if (newPwd !== confirmPwd) {
    showMessage('Passwords do not match');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  const { error } = await sb.auth.updateUser({ password: newPwd });

  if (error) {
    showMessage(error.message);
    btn.disabled = false;
    btn.textContent = 'Update password';
    return;
  }

  showMessage('✅ Password updated! Redirecting...', 'success');
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 2000);
}
</script>
</body>
</html>
